version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=todos
      - POSTGRES_USER=postgres 
    volumes:
      - /home/milu/data/samples/todo/db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl status"]
      interval: 10s
      timeout: 10s
      retries: 5

  projection-cache:
    build: ./go-projection-cache
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - POSTGRES_CONN=host=postgres user=postgres password=postgres dbname=todos sslmode=disable
    networks:
      - backend
    ports:
      - "8081:8081"
      - "50051:50051"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://projection-cache:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      projection-cache:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - PROJECTION_CACHE_URL=http://projection-cache:50051
    networks:
      - backend
    ports:
      - "8080:8080"

  consumer:
    build: ./go-consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - POSTGRES_CONN=host=postgres user=postgres password=postgres dbname=todos sslmode=disable
    networks:
      - backend

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - backend
    ports:
      - "3000:80"

networks:
  backend:
    driver: bridge