server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
  proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection keep-alive;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }
  
  # Proxy SSE endpoint to backend so EventSource can connect to /events
  location /events {
    proxy_pass http://backend:8080/events;
    proxy_http_version 1.1;
  # prevent nginx from closing the upstream connection or buffering
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header Connection "";     # clear to allow keepalive with HTTP/1.1
  proxy_cache_bypass $http_upgrade;
  proxy_buffering off;        # important for SSE
  proxy_cache off;
  proxy_set_header X-Accel-Buffering no;
  chunked_transfer_encoding on;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  send_timeout 3600s;
  tcp_nodelay on;
  }
}
